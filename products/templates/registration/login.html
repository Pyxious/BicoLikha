{% extends 'products/base.html' %}

{% block content %}
<div class="auth-card shadow-sm">
    <h1 style="color: var(--nav-brown); font-weight: 300;">Log In</h1>
    <p class="small text-muted mb-4">Hi there! Sign in to access your bicolikha account for a better shopping experience.</p>
    
    <!-- NUMBER 2: DJANGO MESSAGES (Portal Security Errors) -->
    

    <form method="post">
        {% csrf_token %}
        
        <!-- Field for Email or Phone Number -->
        <div class="mb-3 text-start">
            <label class="small fw-bold text-muted">Email or Phone Number</label>
            <input type="text" name="username" class="bicol-input" required placeholder="Enter your email or phone">
        </div>
        
        <!-- Field for Password -->
        <div class="mb-1 text-start">
            <label class="small fw-bold text-muted">Password</label>
            <div class="position-relative">
                <input type="password" name="password" id="loginPassword" class="bicol-input" required placeholder="Enter your password">
                <i class="far fa-eye-slash position-absolute" id="togglePassword" style="right:15px; top:15px; color:var(--nav-brown); cursor: pointer;"></i>
            </div>
        </div>

        <!-- Forgot Password Link -->
        <div class="text-end mb-4">
            <a href="#" class="small text-muted text-decoration-none">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-bicol shadow-sm">Log In</button>
    </form>

    <!-- THE NEW SIGN UP SECTION -->
    <div class="mt-5 pt-3 border-top text-center">
        <p class="small text-muted mb-3">New to BikoLikha?</p>
        <a href="{% url 'signup' %}" class="btn btn-sm px-5 py-2" 
           style="border: 2px solid var(--nav-brown); color: var(--nav-brown); border-radius: 10px; font-weight: bold; width: 100%;">
            CREATE AN ACCOUNT
        </a>
    </div>
</div>

<style>
    .auth-card {
        background: #fff;
        border-radius: 25px;
        border: 1px solid #eee;
        padding: 50px 40px;
        max-width: 450px;
        margin: 60px auto;
        text-align: center;
    }
    .bicol-input {
        border-radius: 12px;
        border: 1.5px solid #eee;
        background-color: #fcfcfc;
        padding: 12px 15px;
        width: 100%;
        outline: none;
        transition: 0.3s;
        font-size: 0.9rem;
    }
    .bicol-input:focus {
        border-color: var(--nav-brown);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(141, 94, 74, 0.05);
    }
    .btn-bicol {
        background: var(--nav-brown);
        color: white;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        font-weight: 800;
        letter-spacing: 1px;
        border: none;
        transition: 0.3s;
    }
    .btn-bicol:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }
</style>

<script>
    // Simple password toggle logic
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#loginPassword');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
