<!-- templates/admin/admin_login.html -->
{% extends 'admin/management_base.html' %} 

{% block management_content %}

<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card shadow border-0" style="width: 400px; border-radius: 20px;">
        <div class="card-body p-5">
            <h3 class="fw-bold text-center mb-4">Management Portal</h3>
            {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-info{% endif %} border-0 small fw-bold mb-4 py-2" 
                 style="border-radius: 10px; background-color: #fceaea; color: #c0392b; text-align: left;">
                <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="small fw-bold">Admin Email</label>
                    <input type="text" name="username" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn w-100 text-white" style="background: #8d5e4a;">Login to Dashboard</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
