<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bicolikha | Bicolano Art Store</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --header-green: #e9fcd9; /* Light green top */
            --nav-brown: #8d5e4a;    /* Chocolate brown nav */
            --text-brown: #5d3a2d;   /* Dark text brown */
            --bicol-green: #5f9e40;  /* Brand accent green */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #ffffff;
            color: var(--text-brown);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- 1. Top Header Grid --- */
        .top-header {
            background-color: var(--header-green) !important;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 Equal Zones */
            align-items: center;
            width: 100%;
        }

        /* --- 2. Search Bar (Left Column) --- */
        .search-wrapper {
            position: relative;
            max-width: 280px;
        }
        .search-input {
            width: 100%;
            padding: 7px 15px 7px 40px;
            border-radius: 25px;
            border: 1.5px solid var(--nav-brown);
            background: white;
            outline: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .search-input:focus {
            box-shadow: 0 0 5px rgba(141, 94, 74, 0.3);
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--nav-brown);
        }

        /* --- 3. Logo (Center Column) --- */
        .header-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-brown);
            text-decoration: none;
            letter-spacing: -1.5px;
            display: inline-block;
        }
        .header-logo:hover { color: var(--nav-brown); }

        /* --- 4. Action Icons (Right Column) --- */
        .header-right a {
            color: var(--text-brown);
            text-decoration: none;
            margin-left: 20px;
            text-align: center;
            transition: 0.2s;
        }
        .header-right a:hover { opacity: 0.7; }
        .icon-label {
            display: block;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* --- 5. Brown Sub-Navbar --- */
        .sub-nav {
            background-color: var(--nav-brown);
            padding: 10px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .sub-nav a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 0 25px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .sub-nav a:hover { color: white; border-bottom: 2px solid white; padding-bottom: 3px; }

        /* --- Admin Floating Button --- */
        .admin-float-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            background: #212529;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            text-decoration: none;
        }

        /* --- Content Layout --- */
        .main-container {
            min-height: 80vh;
            padding-bottom: 50px;
        }

        .nav-link-custom {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    margin: 0 25px;
    letter-spacing: 1px;
    transition: 0.3s;
    border-bottom: 2px solid transparent; /* Hidden by default */
    padding-bottom: 3px;
}

.nav-link-custom:hover {
    color: white;
}

/* The Active Class */
.active-page {
    color: white !important;
    border-bottom: 2px solid white !important;
}
        

        :root { --bicol-brown: #8d5e4a; --bicol-light-green: #e9fcd9; }
.auth-card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #eee;
    padding: 40px;
    max-width: 500px;
    margin: 50px auto;
}
.bicol-input {
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 12px;
    width: 100%;
    margin-bottom: 15px;
}
.btn-bicol {
    background: var(--bicol-brown);
    color: white;
    border-radius: 10px;
    padding: 12px;
    width: 100%;
    font-weight: bold;
    border: none;
}
    </style>

</head>
<body>

    <!-- ADMIN PANEL BUTTON (Visible only to Staff) -->
    {% if user.is_staff %}
    <a href="{% url 'admin_dashboard' %}" class="admin-float-btn shadow-sm">
        <i class="fas fa-lock me-1"></i> Admin Panel
    </a>
    {% endif %}

    <!-- TOP HEADER -->
    <header class="top-header">
        <div class="container">
            <div class="header-grid">
                
                <!-- LEFT: SEARCH -->
                <div class="header-left">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <form action="#" method="GET">
                            <input type="text" name="q" placeholder="Search..." class="search-input">
                        </form>
                    </div>
                </div>

                <!-- CENTER: LOGO -->
                <div class="header-center text-center">
                    <a href="{% url 'catalog' %}" class="header-logo">bicolikha</a>
                </div>

                <!-- RIGHT: ICONS -->
                <div class="header-right d-flex justify-content-end align-items-center">
                    {% if user.is_authenticated %}
                        <a href="{% url 'profile' %}" title="Profile">
                            <i class="far fa-user fa-lg"></i>
                            <span class="icon-label">{{ user.username }}</span>
                        </a>
                    {% else %}
                        <a href="{% url 'login' %}" title="Login">
                            <i class="far fa-user fa-lg"></i>
                            <span class="icon-label">Sign In</span>
                        </a>
                    {% endif %}
                    
                    <a href="#" title="Favorites">
                        <i class="far fa-heart fa-lg"></i>
                    </a>
                    
                    <a href="{% url 'view_cart' %}" title="Shopping Bag">
                        <i class="fas fa-bag-shopping fa-lg"></i>
                    </a>
                </div>

            </div>
        </div>
    </header>

    <!-- BROWN SUB-NAVBAR -->
    <nav class="sub-nav sticky-top">
    <div class="container d-flex justify-content-center">
        
        <!-- CATALOG LINK -->
        <a href="{% url 'catalog' %}" 
           class="nav-link-custom {% if request.resolver_match.url_name == 'catalog' %}active-page{% endif %}">
           CATALOG
        </a>

        <!-- ARTISTS LINK -->
        <a href="{% url 'artists' %}" 
           class="nav-link-custom {% if request.resolver_match.url_name == 'artists' %}active-page{% endif %}">
           ARTISTS
        </a>

        <!-- POPULAR LINK -->
        <a href="{% url 'popular' %}" 
           class="nav-link-custom {% if request.resolver_match.url_name == 'popular' %}active-page{% endif %}">
           POPULAR
        </a>

        <!-- ABOUT LINK -->
        <a href="{% url 'about' %}" 
           class="nav-link-custom {% if request.resolver_match.url_name == 'about' %}active-page{% endif %}">
           ABOUT
        </a>

    </div>
</nav>

    <!-- DYNAMIC CONTENT AREA -->
    <main class="main-container">
        {% block content %}
        <!-- Child pages (catalog, artists, profile) will inject their code here -->
        {% endblock %}
    </main>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
