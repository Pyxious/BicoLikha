{% extends 'products/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row shadow-sm mx-auto" style="max-width: 900px; border: 2px solid #8d5e4a; border-radius: 40px; overflow: hidden; min-height: 450px;">
        
        <!-- Left Side (Green) -->
        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center" style="background: #e9fcd9; border-right: 2px solid #8d5e4a; padding: 40px 0;">
            <div style="width: 150px; height: 150px; background: #5f9e40; border-radius: 50%; border: 3px solid #8d5e4a;"></div>
            <h2 class="mt-4 fw-bold" style="color: #5d3a2d;">{{ user.username }}</h2>
            
            <!-- LOGOUT BUTTON -->
            <form action="{% url 'logout' %}" method="post" class="mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm px-4" 
                        style="border: 2px solid #8d5e4a; border-radius: 20px; color: #8d5e4a; font-weight: bold; background: transparent;">
                    LOGOUT
                </button>
            </form>
        </div>

        <!-- Right Side (White Content) -->
        <div class="col-md-8 bg-white p-5">
            <h5 class="fw-bold" style="color: #8d5e4a; letter-spacing: 1px;">MY PURCHASES</h5>
            <hr>
            <!-- (Your existing purchase icons here) -->
             <div class="d-flex justify-content-between text-center mb-5">
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>To Pay</div>
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>To Ship</div>
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>To Receive</div>
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>Completed</div>
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>Refund</div>
                <div class="small text-muted"><div style="width:50px; height:50px; background:#e6e6e6; border-radius:10px; margin:auto;" class="mb-1"></div>Cancelled</div>
            </div>

            <h5 class="fw-bold" style="color: #8d5e4a; letter-spacing: 1px;">MY ADDRESSES</h5>
            <hr>
            <div style="width: 100%; height: 25px; background: #f5f5f5; border-radius: 5px;"></div>
        </div>
    </div>
</div>
{% endblock %}
