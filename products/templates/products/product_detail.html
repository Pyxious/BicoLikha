{% extends 'products/base.html' %}
{% block content %}
<style>
    .product-container { background: white; padding: 40px; border-radius: 10px; margin-top: 20px; }
    
    /* THE FIX: Zoom cursor for the detail image */
    .main-img-container { width: 100%; aspect-ratio: 1/1; cursor: zoom-in; overflow: hidden; border-radius: 5px; background: #f8f8f8; }
    .main-img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
    .main-img-container:hover img { opacity: 0.8; }

    /* Modal Styling for the Full Uncropped View */
    .modal-content-transparent { background: transparent; border: none; }
    .full-view-img { 
        max-height: 85vh; 
        max-width: 100%; 
        object-fit: contain; /* SHOWS WHOLE IMAGE */
        border-radius: 8px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .price-box { background: #fbfbfb; padding: 15px 25px; margin: 20px 0; border-radius: 5px; }
    .price-text { color: var(--nav-brown); font-size: 2.2rem; font-weight: 800; }
    .qty-input { width: 60px; text-align: center; border: 1px solid #ddd; outline: none; }
    .btn-cart { background: rgba(141, 94, 74, 0.1); border: 1px solid var(--nav-brown); color: var(--nav-brown); padding: 12px 30px; }
    .btn-buy { background: var(--nav-brown); color: white; padding: 12px 50px; border: none; }
    .label-muted { width: 110px; display: inline-block; color: #757575; font-size: 0.9rem; }
</style>

<div class="container mt-4 mb-5">
    <div class="product-container shadow-sm">
        <div class="row g-5">
            <!-- Left: Clickable Image -->
            <div class="col-md-5">
                <div class="main-img-container border shadow-sm" 
                     onclick="openLightbox('{{ product.image.url }}', '{{ product.title }}')">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.title }}">
                    {% else %}
                        <div class="d-flex align-items-center justify-content-center h-100 text-muted">No Image</div>
                    {% endif %}
                </div>
            </div>

            <!-- Right: Details -->
            <div class="col-md-7">
                <h3 class="fw-bold mb-3">{{ product.title }}</h3>
                <div class="price-box">
                    <span class="price-text">₱{{ product.price }}</span>
                </div>

                <div class="mb-4">
                    <span class="label-muted">Artist</span>
                    <span class="fw-bold" style="color: #5f9e40;">{{ product.artist_ref.artist_name }}</span>
                </div>

                <form action="{% url 'add_to_cart' product.prod_id %}" method="POST">
                    {% csrf_token %}
                    <div class="d-flex align-items-center mb-5">
                        <span class="label-muted">Quantity</span>
                        <div class="d-flex border me-3">
                            <input type="number" name="quantity" value="1" min="1" class="qty-input border-0">
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-cart fw-bold rounded-1">ADD TO CART</button>
                        <button type="submit" class="btn btn-buy fw-bold rounded-1 px-5">BUY NOW</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- FULL IMAGE MODAL (Lightbox) -->
<div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content modal-content-transparent">
            <div class="modal-body text-center">
                <img src="" id="lightboxImg" class="full-view-img">
                <h4 id="lightboxTitle" class="text-white mt-3 fw-bold"></h4>
                <button type="button" class="btn btn-outline-light mt-3 rounded-pill" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openLightbox(imgUrl, title) {
        document.getElementById('lightboxImg').src = imgUrl;
        document.getElementById('lightboxTitle').innerText = title;
        var myModal = new bootstrap.Modal(document.getElementById('lightboxModal'));
        myModal.show();
    }
</script>
{% endblock %}
